name: iban_validator
description: >-
  A comprehensive IBAN validator for Dart and Flutter. Supports 116 country codes — all official ISO 13616 countries plus experimental African countries. Zero dependencies.
version: 1.0.1
homepage: https://github.com/khrisbreezy/iban_validator
repository: https://github.com/khrisbreezy/iban_validator
issue_tracker: https://github.com/khrisbreezy/iban_validator/issues
topics:
  - iban
  - finance
  - banking
  - validation
  - payments

environment:
  sdk: ">=3.0.0 <4.0.0"

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
